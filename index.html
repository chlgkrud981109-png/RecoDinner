<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote of the Day</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="calendar-container">
    <div class="calendar-page current-page">
      <div class="tear-effect"></div>
      <div class="date-display" id="date-display"></div>
      <div class="quote-display" id="quote-display"></div>
    </div>
    <div class="calendar-page next-page">
      <div class="tear-effect"></div>
      <div class="date-display"></div>
      <div class="quote-display"></div>
    </div>
  </div>

  <button id="next-quote-button">Next Quote (Dev Only)</button>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
